<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>🔓 Descifrar AES-256-GCM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f0f2f5; display: flex; justify-content: center; align-items: center;
         min-height: 100vh; padding: 20px; }
  .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.1);
          padding: 30px; width: 100%; max-width: 520px; }
  h1 { font-size: 20px; color: #198754; margin-bottom: 20px; text-align: center; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin: 12px 0 4px; }
  textarea, input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ccc;
         border-radius: 8px; font-size: 14px; resize: vertical; }
  textarea { min-height: 80px; font-family: 'SF Mono', Monaco, monospace; font-size: 13px; }
  input[type="password"] { height: 44px; }
  button { width: 100%; padding: 12px; background: #198754; color: white; border: none;
           border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; }
  button:hover { background: #157347; }
  .result { margin-top: 16px; padding: 14px; border-radius: 8px; display: none; word-break: break-word; }
  .ok { background: #d4edda; color: #155724; display: block; }
  .err { background: #f8d7da; color: #721c24; display: block; }
  .info { font-size: 12px; color: #888; text-align: center; margin-top: 16px; }
  .info a { color: #0d6efd; }
  #debug { font-size: 11px; color: #999; margin-top: 10px; display: none; word-break: break-all; }
</style>
</head>
<body>
<div class="card">
  <h1>🔓 Descifrar AES-256-GCM</h1>
  <p style="color:#666;font-size:13px;text-align:center;margin-bottom:8px;">
    Todo el proceso ocurre en tu navegador. Nada se envía a ningún servidor.
  </p>

  <label for="cifrado">Texto cifrado (base64)</label>
  <textarea id="cifrado" placeholder="Pega aquí el texto cifrado..."></textarea>

  <label for="clave">Clave</label>
  <input type="password" id="clave" placeholder="Contraseña con la que se cifró...">

  <button id="btn">🔓 Descifrar</button>

  <div id="resultado" class="result"></div>

  <p class="info">
    Compatible con mensajes cifrados desde Jcervi_Lab Control Panel
  </p>
</div>

<script>
(function() {
  'use strict';

  const cifradoEl = document.getElementById('cifrado');
  const claveEl = document.getElementById('clave');
  const btn = document.getElementById('btn');
  const resultEl = document.getElementById('resultado');

  btn.addEventListener('click', descifrar);

  function b64ToBytes(str) {
    // Limpiar espacios y convertir url-safe a base64 standard
    str = str.trim().replace(/\s/g, '');
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    // Añadir padding si falta
    while (str.length % 4 !== 0) str += '=';
    return Uint8Array.from(atob(str), function(c) { return c.charCodeAt(0); });
  }

  async function descifrar() {
    const raw = cifradoEl.value.trim();
    const clave = claveEl.value.trim();

    if (!raw || !clave) {
      mostrar('❌ Rellena ambos campos.', 'err');
      return;
    }

    try {
      var datos;
      try {
        datos = b64ToBytes(raw);
      } catch(ex) {
        mostrar('❌ El texto cifrado no tiene formato base64 válido.', 'err');
        return;
      }

      if (datos.length < 28) {
        mostrar('❌ El texto cifrado es demasiado corto (mínimo 28 bytes).', 'err');
        return;
      }

      // Estructura: nonce(12) + ciphertext + tag(16)
      const nonce = datos.slice(0, 12);
      const payload = datos.slice(12); // ciphertext + tag juntos

      if (typeof crypto === 'undefined' || !crypto.subtle) {
        mostrar('❌ Tu navegador no soporta Web Crypto API (HTTPS requerido).', 'err');
        return;
      }

      // Derivar clave AES-256 vía SHA-256
      var keyBytes, key;

      try {
        keyBytes = await crypto.subtle.digest('SHA-256',
          new TextEncoder().encode(clave));
        key = await crypto.subtle.importKey('raw', keyBytes,
          { name: 'AES-GCM' }, false, ['decrypt']);
      } catch(ex) {
        mostrar('❌ Error al procesar la clave: ' + ex.message, 'err');
        return;
      }

      // Descifrar
      var descifrado;

      try {
        descifrado = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: nonce, tagLength: 128 },
          key,
          payload
        );
      } catch(ex) {
        mostrar('❌ Clave incorrecta o mensaje corrupto.', 'err');
        return;
      }

      var texto;

      try {
        texto = new TextDecoder().decode(descifrado);
      } catch(ex) {
        mostrar('❌ Error al decodificar el resultado.', 'err');
        return;
      }

      mostrar('✅ Mensaje descifrado:<br><br><strong>' +
        texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') +
        '</strong>');

    } catch(e) {
      mostrar('❌ Error inesperado: ' + (e.message || e), 'err');
    }
  }

  function mostrar(msg, tipo) {
    resultEl.className = 'result ' + tipo;
    resultEl.innerHTML = msg;
    resultEl.style.display = 'block';
  }
})();
</script>
</body>
</html>
